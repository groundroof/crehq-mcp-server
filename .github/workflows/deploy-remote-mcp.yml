name: Deploy Remote MCP

on:
  push:
    branches:
      - main
    paths:
      - "remote/**"
      - ".github/workflows/deploy-remote-mcp.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-remote-mcp
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: remote

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: remote/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: OAuth flow test
        run: npm run test:oauth

      - name: Full connector flow test
        run: node dist/test/full-flow.test.js

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify live health
        run: |
          curl -fsS https://mcp.crehq.com/health | tee /tmp/crehq-mcp-health.json
          node -e '
            const fs = require("fs");
            const health = JSON.parse(fs.readFileSync("/tmp/crehq-mcp-health.json", "utf8"));
            if (health.ok !== true) throw new Error("Health check did not return ok=true");
            if (!health.issuer || !health.issuer.includes("mcp.crehq.com")) throw new Error("Unexpected issuer");
            console.log(`health ok, tools=${health.tools ?? "unknown"}`);
          '

