name: Deploy Remote MCP

on:
  push:
    branches:
      - main
    paths:
      - "remote/**"
      - ".github/workflows/deploy-remote-mcp.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-remote-mcp
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: remote

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: remote/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: OAuth flow test
        run: npm run test:oauth

      - name: Full connector flow test
        run: node dist/test/full-flow.test.js

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify live health
        run: |
          urls=(
            "https://mcp.crehq.com/health"
            "https://crehq-mcp-remote.mark-ef1.workers.dev/health"
          )

          for url in "${urls[@]}"; do
            echo "Checking ${url}"
            for attempt in 1 2 3 4 5 6; do
              http_status="$(curl -A "CREHQ-MCP-GitHub-Actions-Health/1.0" -sS -w "%{http_code}" -o /tmp/crehq-mcp-health.json "${url}" || true)"
              if [ "${http_status}" = "200" ]; then
                node -e '
                  const fs = require("fs");
                  const health = JSON.parse(fs.readFileSync("/tmp/crehq-mcp-health.json", "utf8"));
                  if (health.status !== "ok") throw new Error("Health check did not return status=ok");
                  if (health.server !== "crehq-mcp-remote") throw new Error("Unexpected server");
                  console.log(`health ok, tools=${health.tools ?? "unknown"}`);
                '
                exit 0
              fi
              echo "Attempt ${attempt} for ${url} returned HTTP ${http_status}; retrying..."
              sleep 5
            done
          done

          echo "Health verification failed for all URLs." >&2
          exit 1
